
<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capital Peak | Search Fund d'Eccellenza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              midnight: '#050c1a',
              gold: '#c5a059',
              goldLight: '#e5c07b',
              slateBlue: '#1e293b'
            },
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-in-right': 'slideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'pulse-soft': 'pulseSoft 4s infinite ease-in-out',
              'mountain-float': 'mountainFloat 10s infinite ease-in-out',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(30px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideInRight: {
                '0%': { opacity: '0', transform: 'translateX(40px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              pulseSoft: {
                '0%, 100%': { opacity: '0.8' },
                '50%': { opacity: '0.4' },
              },
              mountainFloat: {
                '0%, 100%': { transform: 'translateY(0) scale(1)' },
                '50%': { transform: 'translateY(-15px) scale(1.05)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      html { scroll-behavior: smooth; }
      .glass { background: rgba(5, 12, 26, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
      
      .btn-primary {
        transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        position: relative;
        overflow: hidden;
      }
      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 24px -8px rgba(197, 160, 89, 0.5);
      }
      .btn-primary:active {
        transform: translateY(-1px) scale(0.97);
      }

      .nav-link {
        position: relative;
        padding-bottom: 2px;
      }
      .nav-link::after {
        content: '';
        position: absolute;
        width: 0;
        height: 1px;
        bottom: 0;
        left: 0;
        background-color: #c5a059;
        transition: width 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      }
      .nav-link:hover::after {
        width: 100%;
      }

      .interactive-card {
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        border: 1px solid rgba(226, 232, 240, 0.8);
      }
      .interactive-card:hover {
        transform: translateY(-12px);
        border-color: rgba(197, 160, 89, 0.4);
        box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.08);
      }

      .mountain-pattern {
        background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 L50 20 L100 100 Z' fill='%23c5a059' fill-opacity='0.03'/%3E%3C/svg%3E");
        background-repeat: repeat;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.575.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.42.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-[#fcfcfd] text-slate-900 font-sans">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
